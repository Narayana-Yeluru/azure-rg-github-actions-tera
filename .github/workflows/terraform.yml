name: Reusable Terraform Deployment

on:
  workflow_call:
    inputs:
      env:
        required: true
        type: string

jobs:
  terraform:
    runs-on: ubuntu-latest
    environment: ${{ inputs.env }}   # ✅ moved here

    defaults:
      run:
        working-directory: terraform

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        run: terraform plan -var-file=../env/${{ inputs.env }}.tfvars

      - name: Terraform Apply
        run: terraform apply -auto-approve -var-file=../env/${{ inputs.env }}.tfvars
