name: Terraform Multi-Environment Pipeline

on:
  workflow_dispatch:

jobs:

  # ----------------- DEV -----------------
  dev:
    uses: ./.github/workflows/terraform.yml
    with:
      env: dev
    secrets: inherit

  # ----------------- STAGING -----------------
  staging:
    needs: dev
    runs-on: ubuntu-latest
    environment: staging   # 👈 approval happens here

    defaults:
      run:
        working-directory: terraform

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        run: terraform plan -var-file=../env/staging.tfvars

      - name: Terraform Apply
        run: terraform apply -auto-approve -var-file=../env/staging.tfvars

  # ----------------- PROD -----------------
  prod:
    needs: staging
    runs-on: ubuntu-latest
    environment: prod   # 👈 approval happens here

    defaults:
      run:
        working-directory: terraform

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        run: terraform plan -var-file=../env/prod.tfvars

      - name: Terraform Apply
        run: terraform apply -auto-approve -var-file=../env/prod.tfvars
