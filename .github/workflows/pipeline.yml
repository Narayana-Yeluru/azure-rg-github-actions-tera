name: Terraform Multi-Env Pipeline

on:
  workflow_dispatch:

jobs:

  # 🔹 DEV (auto)
  dev:
    uses: ./.github/workflows/terraform.yml
    with:
      env: dev
    secrets: inherit

  # 🔹 STAGING (approval required)
  staging:
    needs: dev
    uses: ./.github/workflows/terraform.yml
    with:
      env: staging
    secrets: inherit
    environment: staging   # ✅ approval works here

  # 🔹 PROD (approval required)
  prod:
    needs: staging
    uses: ./.github/workflows/terraform.yml
    with:
      env: prod
    secrets: inherit
    environment: prod   # ✅ approval works here
