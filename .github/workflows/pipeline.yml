name: Terraform Pipeline (Plan + Apply)

on:
  workflow_dispatch:

jobs:

  # ----------------- DEV (no approval) -----------------
  dev:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: terraform

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan (dev)
        run: terraform plan -var-file=../env/dev.tfvars -input=false

      - name: Terraform Apply (dev)
        run: terraform apply -auto-approve -var-file=../env/dev.tfvars


  # ----------------- STAGING PLAN -----------------
  staging-plan:
    needs: dev
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: terraform

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan (staging)
        run: terraform plan -var-file=../env/staging.tfvars -input=false


  # ----------------- STAGING APPLY (approval here) -----------------
  staging-apply:
    needs: staging-plan
    runs-on: ubuntu-latest
    environment: staging   # 🔐 approval triggers here

    defaults:
      run:
        working-directory: terraform

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply (staging)
        run: terraform apply -auto-approve -var-file=../env/staging.tfvars


  # ----------------- PROD PLAN -----------------
  prod-plan:
    needs: staging-apply
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: terraform

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan (prod)
        run: terraform plan -var-file=../env/prod.tfvars -input=false


  # ----------------- PROD APPLY (approval here) -----------------
  prod-apply:
    needs: prod-plan
    runs-on: ubuntu-latest
    environment: prod   # 🔐 approval triggers here

    defaults:
      run:
        working-directory: terraform

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply (prod)
        run: terraform apply -auto-approve -var-file=../env/prod.tfvars
