name: Terraform Multi-Env Pipeline
on:
  workflow_dispatch:

jobs:
  dev:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - uses: hashicorp/setup-terraform@v3
      - run: terraform init
      - run: terraform plan -var-file=../env/dev.tfvars
      - run: terraform apply -auto-approve -var-file=../env/dev.tfvars

  staging:
    needs: dev
    runs-on: ubuntu-latest
    environment: staging   # 🔐 approval triggers here
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - uses: hashicorp/setup-terraform@v3
      - run: terraform init
      - run: terraform plan -var-file=../env/staging.tfvars
      - run: terraform apply -auto-approve -var-file=../env/staging.tfvars

  prod:
    needs: staging
    runs-on: ubuntu-latest
    environment: prod   # 🔐 approval triggers here
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - uses: hashicorp/setup-terraform@v3
      - run: terraform init
      - run: terraform plan -var-file=../env/prod.tfvars
      - run: terraform apply -auto-approve -var-file=../env/prod.tfvars
